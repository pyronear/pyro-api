version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    labels:
      - "dependencies"
      - "type: misc"
    commit-message:
      prefix: "ci(github)"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    target-branch: "main"
    directory: "/"
    labels:
      - "dependencies"
      - "type: misc"
    commit-message:
      prefix: "build(deps)"
    schedule:
      interval: "daily"
      time: "08:00"
    groups:
      server:
        patterns:
          - "fastapi"
          - "sqlmodel"
          - "pydantic"
          - "pydantic-settings"
          - "requests"
          - "PyJWT"
          - "passlib"
          - "bcrypt"
          - "uvicorn"
          - "asyncpg"
          - "alembic"
          - "sentry-sdk"
          - "posthog"
          - "prometheus-fastapi-instrumentator"
          - "python-multipart"
          - "python-magic"
          - "boto3"
          - "httpx"
          - "geopy"
          - "networkx"
          - "numpy"
          - "pandas"
          - "pyproj"
          - "shapely"
      client:
        patterns:
          - "pyroclient"
      quality:
        patterns:
          - "ruff"
          - "ty"
          - "prek"
          - "types-*"
          - "sqlalchemy-stubs"
      test:
        patterns:
          - "pytest"
          - "pytest-*"
          - "aiosqlite"
      docs:
        patterns:
          - "sphinx"
          - "sphinx*"
          - "docutils"
          - "Jinja2"
          - "furo"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "08:00"
    allow:
      - dependency-name: "ghcr.io/astral-sh/uv"
      - dependency-name: "localstack/localstack"
